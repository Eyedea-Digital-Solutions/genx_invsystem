{% extends "admin/base_site.html" %}
{% load static %}

{% block title %}404 — Not Found | GenX POS{% endblock %}

{% block content %}
<div style="text-align:center;padding:80px 20px 100px;">
  <div style="font-family:var(--mono);font-size:80px;font-weight:500;color:var(--surf-bdr);line-height:1;margin-bottom:16px;letter-spacing:-4px;">404</div>
  <h1 style="font-size:18px;font-weight:600;color:var(--surf-txt);margin-bottom:8px;justify-content:center;">Page not found</h1>
  <p style="color:var(--surf-sub);font-size:13px;margin-bottom:28px;max-width:360px;margin-left:auto;margin-right:auto;">
    The page you're looking for doesn't exist or has been moved.
  </p>
  <a href="{% url 'admin:index' %}"
     style="display:inline-flex;align-items:center;gap:8px;background:var(--ink);color:#fff;padding:10px 22px;border-radius:6px;font-size:12px;font-family:var(--mono);font-weight:500;text-decoration:none;letter-spacing:.3px;transition:background .12s;">
    <i class="bi bi-arrow-left"></i> Return to Dashboard
  </a>
</div>
{% endblock %}
