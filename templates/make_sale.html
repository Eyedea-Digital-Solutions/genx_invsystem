{% extends 'base.html' %}
{% block title %}New Sale (Classic){% endblock %}
{% block page_title %}New Sale{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="alert alert-info border-0 mb-3" style="font-size:13px;">
            <i class="bi bi-display me-2"></i>For a faster experience, use the <a href="{% url 'sales:pos' %}"><strong>POS Terminal</strong></a>.
        </div>
        <div class="card border-0 shadow-sm" style="border-radius:14px;">
            <div class="card-body p-4">
                <form method="post" id="sale-form">
                    {% csrf_token %}
                    <div class="row g-3 mb-4">
                        {% for field in sale_form %}
                        <div class="col-md-6">
                            <label class="form-label fw-semibold" style="font-size:13px;">{{ field.label }}</label>
                            {{ field }}
                        </div>
                        {% endfor %}
                    </div>

                    <h6 class="fw-bold mb-3">Products</h6>
                    <div id="items-container"></div>
                    <button type="button" class="btn btn-outline-secondary btn-sm mb-4" onclick="addItem()">
                        <i class="bi bi-plus-lg me-1"></i>Add Product
                    </button>

                    <input type="hidden" name="item_count" id="item_count" value="0">
                    <button type="submit" class="btn btn-dark px-5">Record Sale</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
let itemCount = 0;
const joints = {{ joints|safe }};

function addItem() {
    const joint = document.querySelector('[name="joint"]').value;
    const container = document.getElementById('items-container');
    const idx = itemCount++;
    document.getElementById('item_count').value = itemCount;
    const row = document.createElement('div');
    row.className = 'row g-2 mb-2 align-items-end';
    row.id = `item-row-${idx}`;
    row.innerHTML = `
        <div class="col-md-5">
            <select name="product_${idx}" class="form-select form-select-sm" required>
                <option value="">— Select Product —</option>
            </select>
        </div>
        <div class="col-md-2"><input type="number" name="quantity_${idx}" class="form-control form-control-sm" placeholder="Qty" min="1" value="1" required></div>
        <div class="col-md-2"><input type="number" name="unit_price_${idx}" class="form-control form-control-sm" placeholder="Price" step="0.01" required></div>
        <div class="col-auto"><button type="button" class="btn btn-outline-danger btn-sm" onclick="document.getElementById('item-row-${idx}').remove()"><i class="bi bi-trash"></i></button></div>
    `;
    container.appendChild(row);

    if (joint) {
        fetch(`/inventory/api/products/?joint_id=${joint}`)
            .then(r => r.json())
            .then(data => {
                const sel = row.querySelector('select');
                data.products.forEach(p => {
                    const opt = document.createElement('option');
                    opt.value = p.id;
                    opt.textContent = p.name + (p.code ? ` [${p.code}]` : '');
                    opt.dataset.price = p.price;
                    sel.appendChild(opt);
                });
                sel.addEventListener('change', () => {
                    const opt = sel.options[sel.selectedIndex];
                    if (opt.dataset.price) row.querySelector('[name="unit_price_' + idx + '"]').value = opt.dataset.price;
                });
            });
    }
}
</script>
{% endblock %}
