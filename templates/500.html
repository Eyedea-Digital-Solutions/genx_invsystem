{% load static %}<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>500 — Server Error | GenX POS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=JetBrains+Mono:wght@600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="{% static 'css/genx-design-system.css' %}">
  <style>
    body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .error-box { text-align: center; padding: 48px 32px; }
    .error-code { font-family: var(--font-mono); font-size: 96px; font-weight: 700; color: var(--rose); line-height: 1; }
    .error-title { font-size: 24px; font-weight: 700; margin: 16px 0 8px; }
    .error-sub { color: var(--text-muted); margin-bottom: 32px; }
  </style>
</head>
<body>
<div class="error-box">
  <div class="error-code">500</div>
  <h1 class="error-title">Server Error</h1>
  <p class="error-sub">Something went wrong on our end. Please try again or contact support.</p>
  <div style="display:flex;gap:12px;justify-content:center">
    <a href="/" class="btn btn-primary"><i class="bi bi-house me-1"></i>Go Home</a>
    <a href="javascript:location.reload()" class="btn btn-sm" style="background:var(--surface-2);border-color:var(--border);color:var(--text-muted)"><i class="bi bi-arrow-clockwise me-1"></i>Retry</a>
  </div>
</div>
</body>
</html>
