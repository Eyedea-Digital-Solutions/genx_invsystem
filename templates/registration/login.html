<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In | GenX POS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            background: #0d0d14;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        .login-card {
            background: #17171f;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 48px 44px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 24px 64px rgba(0,0,0,0.5);
        }
        .brand-mark {
            font-size: 28px;
            font-weight: 900;
            color: #fff;
            letter-spacing: -1px;
            margin-bottom: 4px;
        }
        .brand-mark span { color: #e94560; }
        .brand-sub { color: rgba(255,255,255,0.3); font-size: 12px; margin-bottom: 36px; }
        .form-control {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: #fff;
            border-radius: 10px;
            padding: 12px 16px;
        }
        .form-control:focus {
            background: rgba(255,255,255,0.08);
            border-color: #e94560;
            box-shadow: 0 0 0 3px rgba(233,69,96,0.15);
            color: #fff;
        }
        .form-control::placeholder { color: rgba(255,255,255,0.25); }
        .form-label { color: rgba(255,255,255,0.5); font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
        .btn-signin {
            background: #e94560;
            border: none;
            color: #fff;
            border-radius: 10px;
            padding: 13px;
            font-weight: 700;
            font-size: 15px;
            width: 100%;
            margin-top: 8px;
            transition: opacity 0.15s;
        }
        .btn-signin:hover { opacity: 0.88; color: #fff; }
        .err-box { background: rgba(233,69,96,0.12); border: 1px solid rgba(233,69,96,0.3); border-radius: 8px; color: #ff8096; font-size: 13px; padding: 12px 16px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="brand-mark">GenX <span>POS</span></div>
        <div class="brand-sub">Eyedentity · GenX · Armor Sole</div>

        {% if form.errors %}
        <div class="err-box">
            <i class="bi bi-exclamation-triangle me-2"></i>Incorrect username or password.
        </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Username</label>
                {{ form.username }}
            </div>
            <div class="mb-4">
                <label class="form-label">Password</label>
                {{ form.password }}
            </div>
            <button type="submit" class="btn-signin">
                <i class="bi bi-box-arrow-in-right me-2"></i>Sign In
            </button>
        </form>
    </div>
</body>
</html>
