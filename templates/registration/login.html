{% load static %}<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#f6f3ee">
  <title>Sign In — GenX POS</title>
  <link rel="manifest" href="{% static 'manifest.json' %}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="{% static 'css/genx-design-system.css' %}">
  <style>
    body { background: var(--bg); min-height: 100vh; display: flex; align-items: center; justify-content: center; font-family: var(--font); }
    .login-wrap { width: 100%; max-width: 420px; padding: 24px; }
    .login-brand { text-align: center; margin-bottom: 32px; }
    .login-logo { width: 64px; height: 64px; border-radius: 18px; margin-bottom: 12px; }
    .login-brand-name { font-size: 28px; font-weight: 700; background: linear-gradient(135deg, #7c3aed, #00d68f); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .login-brand-sub { font-size: 13px; color: var(--text-muted); }
    .login-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 32px; }
    .login-title { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
    .login-sub { color: var(--text-muted); font-size: 13px; margin-bottom: 24px; }
    .form-label { font-size: 13px; font-weight: 600; color: var(--text-secondary); margin-bottom: 6px; }
    .form-control { background: var(--surface-2); border: 1px solid var(--border); color: var(--text); border-radius: 10px; padding: 10px 14px; font-family: var(--font); font-size: 14px; }
    .form-control:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(124,58,237,.15); background: var(--surface-2); color: var(--text); }
    .form-control::placeholder { color: var(--text-muted); }
    .input-group-text { background: var(--surface-2); border: 1px solid var(--border); color: var(--text-muted); border-radius: 0 10px 10px 0; }
    .btn-login { width: 100%; padding: 12px; border-radius: 12px; background: var(--accent); border: none; color: #fff; font-size: 15px; font-weight: 700; cursor: pointer; transition: all .15s; }
    .btn-login:hover { background: #6d28d9; transform: translateY(-1px); box-shadow: 0 8px 24px rgba(124,58,237,.4); }
    .login-footer { text-align: center; margin-top: 16px; font-size: 12px; color: var(--text-muted); }
    .bg-orbs { position: fixed; inset: 0; pointer-events: none; overflow: hidden; z-index: 0; }
    .orb { position: absolute; border-radius: 50%; filter: blur(80px); }
    .orb-1 { width: 400px; height: 400px; background: rgba(124,58,237,.15); top: -100px; right: -100px; }
    .orb-2 { width: 300px; height: 300px; background: rgba(0,214,143,.08); bottom: -50px; left: -50px; }
  </style>
</head>
<body>
<div class="bg-orbs"><div class="orb orb-1"></div><div class="orb orb-2"></div></div>

<div class="login-wrap" style="position:relative;z-index:1">
  <div class="login-brand">
    <img src="{% static 'icons/icon-96.png' %}" alt="GenX" class="login-logo">
    <div class="login-brand-name">GenX POS</div>
    <div class="login-brand-sub">Eyedentity · GenX · Armor Sole</div>
  </div>

  <div class="login-card">
    <h2 class="login-title">Welcome back</h2>
    <p class="login-sub">Sign in to your account</p>

    {% if form.errors %}
    <div class="alert" style="background:rgba(229,25,58,.1);border:1px solid rgba(229,25,58,.3);color:#fca5a5;border-radius:10px;padding:12px 16px;font-size:13px;margin-bottom:20px">
      <i class="bi bi-exclamation-circle me-2"></i>Invalid username or password. Please try again.
    </div>
    {% endif %}

    <form method="post" autocomplete="on">
      {% csrf_token %}
      <div class="mb-3">
        <label class="form-label">Username</label>
        <input type="text" name="username" class="form-control" placeholder="Enter your username" autocomplete="username" required autofocus>
      </div>
      <div class="mb-4">
        <label class="form-label">Password</label>
        <div class="input-group">
          <input type="password" name="password" id="password-field" class="form-control" placeholder="Enter your password" autocomplete="current-password" required style="border-radius:10px 0 0 10px">
          <button type="button" class="input-group-text" onclick="togglePwd()" style="cursor:pointer;border-left:none">
            <i class="bi bi-eye" id="pwd-icon"></i>
          </button>
        </div>
      </div>
      <input type="hidden" name="next" value="{{ next }}">
      <button type="submit" class="btn-login"><i class="bi bi-box-arrow-in-right me-2"></i>Sign In</button>
    </form>
  </div>

  <div class="login-footer">
    GenX POS v5 &copy; {% now "Y" %} &nbsp;·&nbsp; <a href="/" style="color:var(--accent)">Back to home</a>
  </div>
</div>

<script>
function togglePwd() {
  const f = document.getElementById('password-field');
  const i = document.getElementById('pwd-icon');
  f.type = f.type === 'password' ? 'text' : 'password';
  i.className = f.type === 'password' ? 'bi bi-eye' : 'bi bi-eye-slash';
}
if ('serviceWorker' in navigator) navigator.serviceWorker.register('/static/js/sw.js', { scope: '/' }).catch(() => {});
</script>
</body>
</html>
