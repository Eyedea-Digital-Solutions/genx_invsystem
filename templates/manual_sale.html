{% extends 'base.html' %}
{% block title %}Manual Sale{% endblock %}
{% block page_title %}Manual Sale{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-7">
        <div class="card border-0 shadow-sm" style="border-radius:14px;">
            <div class="card-body p-4">
                <form method="post" enctype="multipart/form-data">
                    {% csrf_token %}
                    <div class="row g-3 mb-4">
                        {% for field in form %}
                        <div class="col-md-6">
                            <label class="form-label fw-semibold" style="font-size:13px;">{{ field.label }}</label>
                            {{ field }}
                            {% if field.errors %}<div class="text-danger" style="font-size:12px;">{{ field.errors }}</div>{% endif %}
                        </div>
                        {% endfor %}
                    </div>
                    <h6 class="fw-bold mb-3">Products Sold</h6>
                    <div id="items-container"></div>
                    <button type="button" class="btn btn-outline-secondary btn-sm mb-4" onclick="addItem()"><i class="bi bi-plus-lg me-1"></i>Add Product</button>
                    <br>
                    <button type="submit" class="btn btn-dark px-5">Save Manual Sale</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script>
let itemCount = 0;
function addItem() {
    const joint = document.querySelector('[name="joint"]').value;
    const idx = itemCount++;
    const container = document.getElementById('items-container');
    const row = document.createElement('div');
    row.className = 'row g-2 mb-2 align-items-end';
    row.innerHTML = `
        <div class="col-md-5"><select name="product_${idx}" class="form-select form-select-sm" required><option value="">— Select Product —</option></select></div>
        <div class="col-md-2"><input type="number" name="quantity_${idx}" class="form-control form-control-sm" placeholder="Qty" min="1" value="1" required></div>
        <div class="col-md-2"><input type="number" name="unit_price_${idx}" class="form-control form-control-sm" placeholder="Price" step="0.01" required></div>
        <div class="col-auto"><button type="button" class="btn btn-outline-danger btn-sm" onclick="this.closest('.row').remove()"><i class="bi bi-trash"></i></button></div>
    `;
    container.appendChild(row);
    if (joint) {
        fetch(`/inventory/api/products/?joint_id=${joint}`)
            .then(r => r.json())
            .then(data => {
                const sel = row.querySelector('select');
                data.products.forEach(p => {
                    const opt = new Option(`${p.name}${p.code ? ' ['+p.code+']' : ''}`, p.id);
                    opt.dataset.price = p.price;
                    sel.appendChild(opt);
                });
                sel.addEventListener('change', () => {
                    const o = sel.options[sel.selectedIndex];
                    if (o.dataset.price) row.querySelector(`[name="unit_price_${idx}"]`).value = o.dataset.price;
                });
            });
    }
}
</script>
{% endblock %}
