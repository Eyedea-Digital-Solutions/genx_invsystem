{% load static %}<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Page Not Found | GenX POS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=JetBrains+Mono:wght@600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="{% static 'css/genx-design-system.css' %}">
  <style>
    body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .error-box { text-align: center; padding: 48px 32px; }
    .error-code { font-family: var(--font-mono); font-size: 96px; font-weight: 700; background: linear-gradient(135deg, #7c3aed, #00d68f); -webkit-background-clip: text; -webkit-text-fill-color: transparent; line-height: 1; }
    .error-title { font-size: 24px; font-weight: 700; margin: 16px 0 8px; }
    .error-sub { color: var(--text-muted); margin-bottom: 32px; }
  </style>
</head>
<body>
<div class="error-box">
  <div class="error-code">404</div>
  <h1 class="error-title">Page Not Found</h1>
  <p class="error-sub">The page you're looking for doesn't exist or has been moved.</p>
  <div style="display:flex;gap:12px;justify-content:center">
    <a href="/" class="btn btn-primary"><i class="bi bi-house me-1"></i>Go Home</a>
    <a href="javascript:history.back()" class="btn btn-sm" style="background:var(--surface-2);border-color:var(--border);color:var(--text-muted)"><i class="bi bi-arrow-left me-1"></i>Go Back</a>
  </div>
</div>
</body>
</html>
